        * { margin: 0; padding: 0; box-sizing: border-box; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card h2 { color: #8b5a2b; margin-bottom: 15px; border-bottom: 2px solid #e8d9cc; padding-bottom: 10px; }
        .card h3 { color: #5c3a1e; margin: 20px 0 10px; }
        .card p { line-height: 1.6; margin-bottom: 15px; }
        .card ul { margin-left: 30px; margin-bottom: 15px; }
        .card li { margin-bottom: 8px; }
        .btn-volver {
            display: inline-block;
            background: #8b5a2b;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 20px;
        }
        .btn-volver:hover { background: #6b4220; }
        footer {
            background: #3e2a21;
            color: #d4b896;
            text-align: center;
            padding: 25px;
            margin-top: 50px;
        }
        footer a { color: #d4b896; text-decoration: none; margin: 0 8px; }
        footer a:hover { text-decoration: underline; }
        @media (max-width: 768px) {
            .card { padding: 20px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <header>
        <div style="display: flex; align-items: center; justify-content: center; gap: 20px;">
            <img src="/media/logo/arkadya.logo.jpg" alt="Arkadya Cobre Logo" style="height: 80px; width: auto; border-radius: 10px;">
            <div>
                <h1 style="margin: 0;">Arkadya Cobre</h1>
                <p style="margin: 5px 0 0 0;">Artesanía en cobre - Asunción, Paraguay</p>
            </div>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>📍 Tienda online en Asunción - Paraguay | 📦 Envíos a todo el país</p>
        <p>
            <a href="mailto:arkadya.cobre.py@gmail.com">✉️ Email</a> |
            <a href="https://wa.me/595991519823">💬 WhatsApp</a> |
            <a href="https://instagram.com/arkadyacobre">📸 Instagram</a>
        </p>
        <p>
            <a href="/envios/">📦 Envíos</a> |
            <a href="/pagos/">💳 Pagos</a> |
            <a href="/politicas/">📋 Políticas</a> |
            <a href="/aviso-legal/">⚖️ Aviso Legal</a> |
            <a href="/privacidad/">🔒 Privacidad</a>
        </p>
    </footer>

    <!-- Lightbox para imágenes dentro de artículos -->
<style>
    .lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.9);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }
    .lightbox img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        border-radius: 8px;
    }
    .lightbox .close {
        position: absolute;
        top: 20px;
        right: 30px;
        color: white;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
        z-index: 10000;
    }
    .articulo-contenido img {
        cursor: pointer;
        transition: transform 0.2s;
        max-width: 100%;
        height: auto;
    }
    .articulo-contenido img:hover {
        transform: scale(1.02);
    }
</style>

<div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <img id="lightbox-img" src="" alt="Ampliar imagen">
</div>

<script>
    // Lightbox para imágenes dentro del blog (listado y detalle)
    document.addEventListener('DOMContentLoaded', function() {
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('#lightbox .close');

        // Seleccionar todas las imágenes que NO sean el logo del header
        const todasLasImagenes = document.querySelectorAll('img:not(.header-logo img):not(footer img)');
        
        todasLasImagenes.forEach(img => {
            // Evitar duplicar eventos
            if (img.hasAttribute('data-lightbox')) return;
            img.setAttribute('data-lightbox', 'true');
            img.style.cursor = 'pointer';
            img.addEventListener('click', function(e) {
                e.stopPropagation();
                lightboxImg.src = this.src;
                lightbox.style.display = 'flex';
            });
        });

        // Cerrar lightbox
        function cerrarLightbox() {
            lightbox.style.display = 'none';
        }

        closeBtn.addEventListener('click', cerrarLightbox);
        lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox) {
                cerrarLightbox();
            }
        });
    });
</script>
</body>
</html>
